<!DOCTYPE html>
<!-- Author: jason@wug.ninja                                        -->
<!-- Bigleaf Dashboard Template for WhatsUpGoldPS                   -->
<!-- Renders SD-WAN site inventory with colour-coded status and     -->
<!-- risk-level indicators for Bigleaf Networks environments.       -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>ReplaceYourReportNameHere</title>
    <link rel="icon" type="image/x-icon" href="https://wug.ninja/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas/dist/html2canvas.min.js" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .export-menu { margin-top: 3rem; margin-right: 15px; }
        button#exportBtn { margin-top: 10px; }
        .status-green  { color: #198754; font-weight: 600; }
        .status-red    { color: #dc3545; font-weight: 600; }
        .status-orange { color: #fd7e14; font-weight: 600; }
        .status-grey   { color: #6c757d; font-weight: 600; }
        .status-blue   { color: #0d6efd; font-weight: 600; }
        .status-teal   { color: #20c997; font-weight: 600; }
        .status-purple { color: #6f42c1; font-weight: 600; }
        .status-dot    { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot-green     { background-color: #198754; }
        .dot-red       { background-color: #dc3545; }
        .dot-orange    { background-color: #fd7e14; }
        .dot-grey      { background-color: #6c757d; }
        .dot-blue      { background-color: #0d6efd; }
        .dot-purple    { background-color: #6f42c1; }
        .summary-card  { border-left: 4px solid; cursor: pointer; transition: box-shadow .15s, transform .1s; user-select: none; min-width: 90px; }
        .summary-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); transform: translateY(-1px); }
        .summary-card.active-filter { box-shadow: 0 0 0 2px #0d6efd; }
        .card-total    { border-left-color: #343a40; }
        .card-green    { border-left-color: #198754; }
        .card-red      { border-left-color: #dc3545; }
        .card-orange   { border-left-color: #fd7e14; }
        .card-blue     { border-left-color: #0d6efd; }
        .details-toggle { cursor: pointer; user-select: none; }
        .details-toggle:hover { text-decoration: underline; }
        .row-counter { font-size: 0.85rem; color: #6c757d; padding: 6px 0; white-space: nowrap; }
        .fixed-table-toolbar { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .fixed-table-toolbar > .row-counter { flex: 1; order: 1; }
        .fixed-table-toolbar > .search { order: 2; }
        .fixed-table-toolbar > .columns { order: 3; }
    </style>
</head>

<body>
    <div class="container-fluid p-3">
        <div class="row mb-2 g-2 align-items-center">
            <div class="col" id="filterTotal" style="max-width:14%">
                <div class="card summary-card card-total h-100"><div class="card-body py-2 px-3">
                    <div class="text-muted small">Total Sites</div><h4 id="totalSites" class="mb-0">0</h4>
                </div></div>
            </div>
            <div class="col" id="filterHealthy" style="max-width:14%">
                <div class="card summary-card card-green h-100"><div class="card-body py-2 px-3">
                    <div class="text-muted small">Healthy</div><h4 id="healthySites" class="mb-0 status-green">0</h4>
                </div></div>
            </div>
            <div class="col" id="filterCircuit" style="max-width:14%">
                <div class="card summary-card card-orange h-100"><div class="card-body py-2 px-3">
                    <div class="text-muted small">Circuit Issues</div><h4 id="circuitIssueSites" class="mb-0 status-orange">0</h4>
                </div></div>
            </div>
            <div class="col" id="filterOffline" style="max-width:14%">
                <div class="card summary-card card-red h-100"><div class="card-body py-2 px-3">
                    <div class="text-muted small">Offline</div><h4 id="offlineSites" class="mb-0 status-red">0</h4>
                </div></div>
            </div>
            <div class="col" id="filterProvisioning" style="max-width:14%">
                <div class="card summary-card card-blue h-100"><div class="card-body py-2 px-3">
                    <div class="text-muted small">Provisioning</div><h4 id="provisioningSites" class="mb-0 status-blue">0</h4>
                </div></div>
            </div>
            <div class="col-auto ps-3">
                <span class="details-toggle text-muted small" data-bs-toggle="collapse" data-bs-target="#detailsSection" aria-expanded="false">
                    <i class="bi bi-chevron-right" id="detailsChevron"></i> details
                </span>
            </div>
        </div>
        <div class="collapse" id="detailsSection">

            <table id="table" data-classes="table table-light table-striped table-bordered table-responsive table-sm caption-top"
                data-show-export="false" data-show-toggle="true" data-show-columns="true" data-search="true"
                data-pagination="false"
                data-page-size="50" data-page-list="[25, 50, 100, 200, All]"
                data-sort-name="SiteStatus" data-sort-order="desc">
                <caption class="p-0 bg-secondary text-white"><div class="d-flex justify-content-between">
                    <h6 class="m-1 text-white">&#x1F977; WhatsUpGoldPS Custom Report</h6>
                    <h6 class="m-1 text-white">ReplaceYourReportNameHere</h6>
                    <h6 class="m-1 text-white">Updated: ReplaceUpdateTimeHere</h6>
                </div></caption>
            </table>
        </div>
    </div>
    <script type="text/javascript">
    var $table = $('#table'), allData = [], activeFilter = null;
    function escapeHtml(t) { if(t==null)return''; return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function formatSiteStatus(value, row, index) {
        if (!value) return '<span class="status-grey"><span class="status-dot dot-grey"></span>Unknown</span>';
        var v = String(value).toLowerCase();
        if (v==='healthy') return '<span class="status-green"><span class="status-dot dot-green"></span>' + escapeHtml(value) + '</span>';
        if (v==='circuit-issues') return '<span class="status-orange"><span class="status-dot dot-orange"></span>' + escapeHtml(value) + '</span>';
        if (v==='offline') return '<span class="status-red"><span class="status-dot dot-red"></span>' + escapeHtml(value) + '</span>';
        if (v==='provisioning') return '<span class="status-blue"><span class="status-dot dot-blue"></span>' + escapeHtml(value) + '</span>';
        return '<span class="status-grey"><span class="status-dot dot-grey"></span>' + escapeHtml(value) + '</span>';
    }
    function formatRiskLevel(value, row, index) {
        if (!value) return '';
        var v = String(value).toLowerCase();
        if (v==='healthy') return '<span class="status-green">' + escapeHtml(value) + '</span>';
        if (v==='low') return '<span class="status-teal">' + escapeHtml(value) + '</span>';
        if (v==='medium') return '<span class="status-orange">' + escapeHtml(value) + '</span>';
        if (v==='high') return '<span class="status-red">' + escapeHtml(value) + '</span>';
        if (v==='site-outage') return '<span class="status-purple">' + escapeHtml(value) + '</span>';
        return escapeHtml(value);
    }
    function formatWugState(value, row, index) {
        if (!value) return '';
        var v = String(value).toLowerCase();
        if (v==='up') return '<span class="status-green">' + escapeHtml(value) + '</span>';
        if (v==='down') return '<span class="status-red">' + escapeHtml(value) + '</span>';
        return escapeHtml(value);
    }
    function computeSummary(data) {
        var healthy=0, circuit=0, offline=0, prov=0;
        data.forEach(function(r) {
            var s = String(r.SiteStatus||'').toLowerCase();
            if (s==='healthy') healthy++; else if (s==='circuit-issues') circuit++; else if (s==='offline') offline++; else if (s==='provisioning') prov++;
        });
        $('#totalSites').text(data.length); $('#healthySites').text(healthy); $('#circuitIssueSites').text(circuit);
        $('#offlineSites').text(offline); $('#provisioningSites').text(prov);
    }
    function applyFilter(filterName) {
        if (activeFilter === filterName) { activeFilter = null; $('.summary-card').removeClass('active-filter'); $table.bootstrapTable('load', allData); return; }
        activeFilter = filterName; $('.summary-card').removeClass('active-filter');
        $('#filter' + filterName.charAt(0).toUpperCase() + filterName.slice(1) + ' .summary-card').addClass('active-filter');
        var filtered = allData.filter(function(r) {
            var s = String(r.SiteStatus||'').toLowerCase();
            switch(filterName) { case 'total': return true; case 'healthy': return s==='healthy'; case 'circuit': return s==='circuit-issues'; case 'offline': return s==='offline'; case 'provisioning': return s==='provisioning'; default: return true; }
        }); $table.bootstrapTable('load', filtered);
    }
    function getExportRows() { return $table.bootstrapTable('getData', { useCurrentPage:false, includeHiddenRows:true }); }
    function downloadBlob(c,f,m) { saveAs(new Blob([c],{type:m}),f); }
    function escapeCsvValue(v) { var s=String(v==null?'':v); return (s.indexOf('"')!==-1||s.indexOf(',')!==-1||s.indexOf('\n')!==-1)?'"'+s.replace(/"/g,'""')+'"':s; }
    function exportCsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join(',')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join(','));}); downloadBlob(l.join('\r\n'),'bigleaf_dashboard.csv','text/csv;charset=utf-8'); }
    function exportJson(rows) { downloadBlob(JSON.stringify(rows,null,2),'bigleaf_dashboard.json','application/json;charset=utf-8'); }
    function exportTxt(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var c=rows.map(function(r,i){return['--- Row '+(i+1)+' ---'].concat(h.map(function(k){return k+': '+(r[k]==null?'':r[k]);})).join('\r\n');}).join('\r\n\r\n'); downloadBlob(c,'bigleaf_dashboard.txt','text/plain;charset=utf-8'); }
    function exportXlsx(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Bigleaf'); XLSX.writeFile(wb,'bigleaf_dashboard.xlsx'); }
    function exportXls(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Bigleaf'); XLSX.writeFile(wb,'bigleaf_dashboard.xls.xlsx'); }
    function exportTsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join('\t')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join('\t'));}); downloadBlob(l.join('\r\n'),'bigleaf_dashboard.tsv','text/tab-separated-values;charset=utf-8'); }
    function exportSql(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var s=rows.map(function(r){var v=h.map(function(k){return"'"+String(r[k]==null?'':r[k]).replace(/'/g,"''")+"'";});return'INSERT INTO dashboard_export ('+h.join(', ')+') VALUES ('+v.join(', ')+');';}).join('\r\n'); downloadBlob(s,'bigleaf_dashboard.sql','text/plain;charset=utf-8'); }
    function exportPng() { html2canvas(document.querySelector('#table')).then(function(c){c.toBlob(function(b){saveAs(b,'bigleaf_dashboard.png');}); }); }
    $(function () {
        $table.bootstrapTable({ replaceThisHere });
        allData = $table.bootstrapTable('getData'); computeSummary(allData);
        $('#filterTotal').on('click', function() { applyFilter('total'); });
        $('#filterHealthy').on('click', function() { applyFilter('healthy'); });
        $('#filterCircuit').on('click', function() { applyFilter('circuit'); });
        $('#filterOffline').on('click', function() { applyFilter('offline'); });
        $('#filterProvisioning').on('click', function() { applyFilter('provisioning'); });
        $('#detailsSection').on('show.bs.collapse', function() { $('#detailsChevron').removeClass('bi-chevron-right').addClass('bi-chevron-down'); }).on('hide.bs.collapse', function() { $('#detailsChevron').removeClass('bi-chevron-down').addClass('bi-chevron-right'); });
        // Custom export handler
        function wireExport() {
            $(document).on('click', '.dropdown-item[data-type]', function(e) {
                e.preventDefault(); var t=$(this).data('type'), r=getExportRows();
                switch(t) { case 'csv':exportCsv(r);break; case 'txt':exportTxt(r);break; case 'xlsx':exportXlsx(r);break; case 'xls':exportXls(r);break; case 'json':exportJson(r);break; case 'png':exportPng();break; case 'sql':exportSql(r);break; case 'tsv':exportTsv(r);break; }
            });
        }

        // Row counter
        function updateRowCounter() {
            var shown = $table.bootstrapTable('getData').length;
            var total = allData.length;
            $('#rowCounter').text(shown === total ? 'Showing ' + total + ' rows' : 'Showing ' + shown + ' of ' + total + ' rows');
        }

        // Inject all controls into bootstrap-table's toolbar
        var $toolbar = $('.fixed-table-toolbar');
        if ($toolbar.length) {
            // Row counter on the left
            $toolbar.prepend('<span class="row-counter" id="rowCounter"></span>');

            // Pagination toggle + custom export into the button group
            var $btnGroup = $toolbar.find('.columns');
            if ($btnGroup.length) {
                // Pagination toggle
                var $pgBtn = $('<button type="button" class="btn btn-secondary" title="Toggle pagination">' +
                    '<i class="bi bi-list-ol"></i></button>');
                $btnGroup.prepend($pgBtn);
                $pgBtn.on('click', function() {
                    var isOn = $table.bootstrapTable('getOptions').pagination;
                    $table.bootstrapTable('togglePagination');
                    $(this).toggleClass('active', !isOn);
                    updateRowCounter();
                });

                // Custom export dropdown
                var $exportBtn = $(
                    '<div class="btn-group">' +
                    '<button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">' +
                    '<i class="bi bi-download"></i> Export</button>' +
                    '<ul class="dropdown-menu dropdown-menu-end">' +
                    '<li><a class="dropdown-item" href="#" data-type="csv">CSV</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="txt">TXT</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="xlsx">XLSX</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="xls">XLS</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="json">JSON</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="png">PNG</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="sql">SQL</a></li>' +
                    '<li><a class="dropdown-item" href="#" data-type="tsv">TSV</a></li>' +
                    '</ul></div>');
                $btnGroup.append($exportBtn);
            }
        }

        $table.on('post-body.bs.table', updateRowCounter);
        wireExport();
        updateRowCounter();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<!-- Author: jason@wug.ninja                                        -->
<!-- Certificate Dashboard Template for WhatsUpGoldPS               -->
<!-- Renders certificate discovery results with colour-coded         -->
<!-- expiration status indicators and WUG device enrichment.         -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>ReplaceYourReportNameHere</title>
    <link rel="icon" type="image/x-icon" href="https://wug.ninja/favicon.ico">
    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css" crossorigin="anonymous">
    <!-- JS dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.js" crossorigin="anonymous"></script>
    <!-- Export plugins -->
    <script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas/dist/html2canvas.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin/tableExport.min.js" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .export-menu { margin-top: 3rem; margin-right: 15px; }
        button#exportBtn { margin-top: 10px; }
        /* Status colours */
        .status-healthy  { color: #198754; font-weight: 600; }
        .status-warning  { color: #fd7e14; font-weight: 600; }
        .status-critical { color: #dc3545; font-weight: 600; }
        .status-expired  { color: #6f42c1; font-weight: 600; text-decoration: line-through; }
        .status-unknown  { color: #6c757d; font-weight: 600; }
        /* Status dots */
        .status-dot  { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot-healthy  { background-color: #198754; }
        .dot-warning  { background-color: #fd7e14; }
        .dot-critical { background-color: #dc3545; }
        .dot-expired  { background-color: #6f42c1; }
        .dot-unknown  { background-color: #6c757d; }
        /* WUG state colours */
        .wug-up   { color: #198754; font-weight: 600; }
        .wug-down { color: #dc3545; font-weight: 600; }
        /* Summary cards */
        .summary-card   { border-left: 4px solid; }
        .card-total     { border-left-color: #343a40; }
        .card-healthy   { border-left-color: #198754; }
        .card-warning   { border-left-color: #fd7e14; }
        .card-critical  { border-left-color: #dc3545; }
        .card-expired   { border-left-color: #6f42c1; }
        .card-unknown   { border-left-color: #6c757d; }
    </style>
</head>

<body>
    <div class="container-fluid p-3">
        <!-- Header -->
        <div class="row mb-3">
            <div class="col">
                <h3 class="mb-0"><i class="bi bi-shield-lock"></i> ReplaceYourReportNameHere</h3>
                <small class="text-muted">Updated: ReplaceUpdateTimeHere</small>
            </div>
        </div>

        <!-- Summary cards (populated by JS) -->
        <div class="row mb-3" id="summaryRow">
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-total h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Total Certificates</div>
                        <h4 id="totalCerts" class="mb-0">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-healthy h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Healthy</div>
                        <h4 id="healthyCerts" class="mb-0 status-healthy">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-warning h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Warning (&le; 90d)</div>
                        <h4 id="warningCerts" class="mb-0 status-warning">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-critical h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Critical (&le; 30d)</div>
                        <h4 id="criticalCerts" class="mb-0 status-critical">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-expired h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Expired</div>
                        <h4 id="expiredCerts" class="mb-0 status-expired">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-unknown h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Unknown</div>
                        <h4 id="unknownCerts" class="mb-0 status-unknown">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Export dropdown -->
        <div class="float-end btn-group" role="group">
            <button id="exportBtn" type="button" class="btn btn-secondary dropdown-toggle rounded-end"
                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <i class="bi bi-download"></i> Export
            </button>
            <ul class="dropdown-menu dropdown-menu-end export-menu">
                <li><a class="dropdown-item" href="#" data-type="csv">CSV</a></li>
                <li><a class="dropdown-item" href="#" data-type="txt">TXT</a></li>
                <li><a class="dropdown-item" href="#" data-type="xlsx">XLSX</a></li>
                <li><a class="dropdown-item" href="#" data-type="xls">XLS</a></li>
                <li><a class="dropdown-item" href="#" data-type="json">JSON</a></li>
                <li><a class="dropdown-item" href="#" data-type="png">PNG</a></li>
                <li><a class="dropdown-item" href="#" data-type="sql">SQL</a></li>
                <li><a class="dropdown-item" href="#" data-type="tsv">TSV</a></li>
            </ul>
        </div>

        <!-- Main data table -->
        <table id="table" data-toolbar="#toolbar"
            data-classes="table table-light table-striped table-bordered table-responsive table-sm caption-top"
            data-show-toggle="true"
            data-show-columns="true"
            data-search="true"
            data-pagination="true"
            data-page-size="50"
            data-page-list="[25, 50, 100, 200, All]"
            data-sort-name="DaysUntilExpiry"
            data-sort-order="asc">
        </table>
    </div>

    <script type="text/javascript">
    var $table = $('#table');

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // Certificate status formatter (Healthy / Warning / Critical / Expired / Unknown)
    function formatCertStatus(value, row, index) {
        if (!value) return '<span class="status-unknown"><span class="status-dot dot-unknown"></span>Unknown</span>';
        var lower = String(value).toLowerCase();
        if (lower === 'healthy') {
            return '<span class="status-healthy"><span class="status-dot dot-healthy"></span>' + escapeHtml(value) + '</span>';
        }
        if (lower === 'warning') {
            return '<span class="status-warning"><span class="status-dot dot-warning"></span>' + escapeHtml(value) + '</span>';
        }
        if (lower === 'critical') {
            return '<span class="status-critical"><span class="status-dot dot-critical"></span>' + escapeHtml(value) + '</span>';
        }
        if (lower === 'expired') {
            return '<span class="status-expired"><span class="status-dot dot-expired"></span>' + escapeHtml(value) + '</span>';
        }
        return '<span class="status-unknown"><span class="status-dot dot-unknown"></span>' + escapeHtml(value) + '</span>';
    }

    // Days until expiry formatter with colour coding
    function formatDaysUntilExpiry(value, row, index) {
        if (value === 'N/A' || value === null || value === undefined) {
            return '<span class="status-unknown">N/A</span>';
        }
        var days = parseInt(value, 10);
        if (isNaN(days)) return escapeHtml(value);
        if (days < 0) return '<span class="status-expired">' + days + 'd (EXPIRED)</span>';
        if (days <= 30) return '<span class="status-critical">' + days + 'd</span>';
        if (days <= 90) return '<span class="status-warning">' + days + 'd</span>';
        return '<span class="status-healthy">' + days + 'd</span>';
    }

    // WUG device state formatter
    function formatWugState(value, row, index) {
        if (!value) return '';
        var lower = String(value).toLowerCase();
        if (lower === 'up') return '<span class="wug-up">' + escapeHtml(value) + '</span>';
        if (lower === 'down') return '<span class="wug-down">' + escapeHtml(value) + '</span>';
        return escapeHtml(value);
    }

    function computeSummary(data) {
        var total = data.length;
        var healthy = 0, warning = 0, critical = 0, expired = 0, unknown = 0;
        data.forEach(function(row) {
            var status = String(row.Status || '').toLowerCase();
            if (status === 'healthy') healthy++;
            else if (status === 'warning') warning++;
            else if (status === 'critical') critical++;
            else if (status === 'expired') expired++;
            else unknown++;
        });
        $('#totalCerts').text(total);
        $('#healthyCerts').text(healthy);
        $('#warningCerts').text(warning);
        $('#criticalCerts').text(critical);
        $('#expiredCerts').text(expired);
        $('#unknownCerts').text(unknown);
    }

    function getExportRows() {
        return $table.bootstrapTable('getData', {
            useCurrentPage: false,
            includeHiddenRows: true
        });
    }

    function downloadBlob(content, fileName, mimeType) {
        var blob = new Blob([content], { type: mimeType });
        saveAs(blob, fileName);
    }

    function escapeCsvValue(value) {
        var s = String(value == null ? '' : value);
        if (s.indexOf('"') !== -1 || s.indexOf(',') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1) {
            return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
    }

    function exportCsv(rows) {
        if (!rows.length) return;
        var headers = Object.keys(rows[0]);
        var lines = [headers.join(',')];
        rows.forEach(function(row) {
            lines.push(headers.map(function(h) { return escapeCsvValue(row[h]); }).join(','));
        });
        downloadBlob(lines.join('\r\n'), 'certificate_dashboard_export.csv', 'text/csv;charset=utf-8');
    }

    function exportJson(rows) {
        downloadBlob(JSON.stringify(rows, null, 2), 'certificate_dashboard_export.json', 'application/json;charset=utf-8');
    }

    function exportTxt(rows) {
        if (!rows.length) return;
        var headers = Object.keys(rows[0]);
        var content = rows.map(function(row, i) {
            return ['--- Row ' + (i + 1) + ' ---'].concat(
                headers.map(function(h) { return h + ': ' + (row[h] == null ? '' : row[h]); })
            ).join('\r\n');
        }).join('\r\n\r\n');
        downloadBlob(content, 'certificate_dashboard_export.txt', 'text/plain;charset=utf-8');
    }

    function exportXlsx(rows) {
        if (!rows.length) return;
        var ws = XLSX.utils.json_to_sheet(rows);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Certificates');
        XLSX.writeFile(wb, 'certificate_dashboard_export.xlsx');
    }

    function exportXls(rows) {
        if (!rows.length) return;
        var ws = XLSX.utils.json_to_sheet(rows);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Certificates');
        XLSX.writeFile(wb, 'certificate_dashboard_export.xls.xlsx');
    }

    function exportTsv(rows) {
        if (!rows.length) return;
        var headers = Object.keys(rows[0]);
        var lines = [headers.join('\t')];
        rows.forEach(function(row) {
            lines.push(headers.map(function(h) { return escapeCsvValue(row[h]); }).join('\t'));
        });
        downloadBlob(lines.join('\r\n'), 'certificate_dashboard_export.tsv', 'text/tab-separated-values;charset=utf-8');
    }

    function exportSql(rows) {
        if (!rows.length) return;
        var headers = Object.keys(rows[0]);
        var sql = rows.map(function(row) {
            var values = headers.map(function(h) {
                return "'" + String(row[h] == null ? '' : row[h]).replace(/'/g, "''") + "'";
            });
            return 'INSERT INTO dashboard_export (' + headers.join(', ') + ') VALUES (' + values.join(', ') + ');';
        }).join('\r\n');
        downloadBlob(sql, 'certificate_dashboard_export.sql', 'text/plain;charset=utf-8');
    }

    function exportPng() {
        html2canvas(document.querySelector('#table')).then(function(canvas) {
            canvas.toBlob(function(blob) { saveAs(blob, 'certificate_dashboard_export.png'); });
        });
    }

    $(function () {
        $table.bootstrapTable({
            replaceThisHere
        });

        // Compute summary after table loads
        var data = $table.bootstrapTable('getData');
        computeSummary(data);

        // Export handlers
        $('.dropdown-item[data-type]').on('click', function (e) {
            e.preventDefault();
            var type = $(this).data('type');
            var rows = getExportRows();
            switch (type) {
                case 'csv':  exportCsv(rows); break;
                case 'txt':  exportTxt(rows); break;
                case 'xlsx': exportXlsx(rows); break;
                case 'xls':  exportXls(rows); break;
                case 'json': exportJson(rows); break;
                case 'png':  exportPng(); break;
                case 'sql':  exportSql(rows); break;
                case 'tsv':  exportTsv(rows); break;
            }
        });
    });
    </script>
</body>
</html>

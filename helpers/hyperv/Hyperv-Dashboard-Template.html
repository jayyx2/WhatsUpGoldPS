<!DOCTYPE html>
<!-- Author: jason@wug.ninja                                        -->
<!-- Hyper-V Dashboard Template for WhatsUpGoldPS                   -->
<!-- Renders VM inventory with host context and colour-coded         -->
<!-- state indicators for quick operational visibility.              -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>ReplaceYourReportNameHere</title>
    <link rel="icon" type="image/x-icon" href="https://wug.ninja/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table/dist/bootstrap-table.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin/tableExport.min.js" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .export-menu { margin-top: 3rem; margin-right: 15px; }
        button#exportBtn { margin-top: 10px; }
        .status-green  { color: #198754; font-weight: 600; }
        .status-red    { color: #dc3545; font-weight: 600; }
        .status-orange { color: #fd7e14; font-weight: 600; }
        .status-grey   { color: #6c757d; font-weight: 600; }
        .status-dot    { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot-green     { background-color: #198754; }
        .dot-red       { background-color: #dc3545; }
        .dot-orange    { background-color: #fd7e14; }
        .dot-grey      { background-color: #6c757d; }
        .summary-card  { border-left: 4px solid; }
        .card-total    { border-left-color: #343a40; }
        .card-green    { border-left-color: #198754; }
        .card-red      { border-left-color: #dc3545; }
        .card-orange   { border-left-color: #fd7e14; }
        .card-hosts    { border-left-color: #0d6efd; }
    </style>
</head>

<body>
    <div class="container-fluid p-3">
        <div class="row mb-3">
            <div class="col">
                <h3 class="mb-0"><i class="bi bi-windows"></i> ReplaceYourReportNameHere</h3>
                <small class="text-muted">Updated: ReplaceUpdateTimeHere</small>
            </div>
        </div>

        <div class="row mb-3" id="summaryRow">
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-total h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Total VMs</div>
                        <h4 id="totalVMs" class="mb-0">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-green h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Running</div>
                        <h4 id="runningVMs" class="mb-0 status-green">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-red h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Off</div>
                        <h4 id="offVMs" class="mb-0 status-red">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-orange h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Saved / Paused</div>
                        <h4 id="otherVMs" class="mb-0 status-orange">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 mb-2">
                <div class="card summary-card card-hosts h-100">
                    <div class="card-body py-2">
                        <div class="text-muted small">Hosts</div>
                        <h4 id="totalHosts" class="mb-0" style="color:#0d6efd;font-weight:600;">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="float-end btn-group" role="group">
            <button id="exportBtn" type="button" class="btn btn-secondary dropdown-toggle rounded-end"
                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <i class="bi bi-download"></i> Export
            </button>
            <ul class="dropdown-menu dropdown-menu-end export-menu">
                <li><a class="dropdown-item" href="#" data-type="csv">CSV</a></li>
                <li><a class="dropdown-item" href="#" data-type="txt">TXT</a></li>
                <li><a class="dropdown-item" href="#" data-type="xlsx">XLSX</a></li>
                <li><a class="dropdown-item" href="#" data-type="xls">XLS</a></li>
                <li><a class="dropdown-item" href="#" data-type="json">JSON</a></li>
                <li><a class="dropdown-item" href="#" data-type="png">PNG</a></li>
                <li><a class="dropdown-item" href="#" data-type="sql">SQL</a></li>
                <li><a class="dropdown-item" href="#" data-type="tsv">TSV</a></li>
            </ul>
        </div>

        <table id="table"
            data-classes="table table-light table-striped table-bordered table-responsive table-sm caption-top"
            data-show-toggle="true" data-show-columns="true" data-search="true"
            data-pagination="true" data-page-size="50"
            data-page-list="[25, 50, 100, 200, All]"
            data-sort-name="VMName" data-sort-order="asc">
        </table>
    </div>

    <script type="text/javascript">
    var $table = $('#table');

    function escapeHtml(t) {
        if (t == null) return '';
        return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function formatState(value) {
        if (!value) return '<span class="status-grey"><span class="status-dot dot-grey"></span>Unknown</span>';
        var v = String(value).toLowerCase();
        if (v === 'running')  return '<span class="status-green"><span class="status-dot dot-green"></span>' + escapeHtml(value) + '</span>';
        if (v === 'off')      return '<span class="status-red"><span class="status-dot dot-red"></span>' + escapeHtml(value) + '</span>';
        if (v === 'saved' || v === 'paused') return '<span class="status-orange"><span class="status-dot dot-orange"></span>' + escapeHtml(value) + '</span>';
        return '<span class="status-grey"><span class="status-dot dot-grey"></span>' + escapeHtml(value) + '</span>';
    }

    function formatHeartbeat(value) {
        if (!value || value === 'N/A') return '<span class="status-grey">N/A</span>';
        var v = String(value).toLowerCase();
        if (v.indexOf('ok') !== -1) return '<span class="status-green">' + escapeHtml(value) + '</span>';
        if (v.indexOf('no contact') !== -1 || v.indexOf('error') !== -1) return '<span class="status-red">' + escapeHtml(value) + '</span>';
        return escapeHtml(value);
    }

    function computeSummary(data) {
        var running = 0, off = 0, other = 0, hosts = {};
        data.forEach(function(r) {
            var s = String(r.State || '').toLowerCase();
            if (s === 'running') running++;
            else if (s === 'off') off++;
            else other++;
            if (r.Host) hosts[r.Host] = true;
        });
        $('#totalVMs').text(data.length);
        $('#runningVMs').text(running);
        $('#offVMs').text(off);
        $('#otherVMs').text(other);
        $('#totalHosts').text(Object.keys(hosts).length);
    }

    function getExportRows() { return $table.bootstrapTable('getData', { useCurrentPage: false, includeHiddenRows: true }); }
    function downloadBlob(c, f, m) { saveAs(new Blob([c], { type: m }), f); }
    function escapeCsvValue(v) { var s = String(v == null ? '' : v); return (s.indexOf('"')!==-1||s.indexOf(',')!==-1||s.indexOf('\n')!==-1)?'"'+s.replace(/"/g,'""')+'"':s; }

    function exportCsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join(',')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join(','));}); downloadBlob(l.join('\r\n'),'hyperv_dashboard.csv','text/csv;charset=utf-8'); }
    function exportJson(rows) { downloadBlob(JSON.stringify(rows,null,2),'hyperv_dashboard.json','application/json;charset=utf-8'); }
    function exportTxt(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var c=rows.map(function(r,i){return['--- Row '+(i+1)+' ---'].concat(h.map(function(k){return k+': '+(r[k]==null?'':r[k]);})).join('\r\n');}).join('\r\n\r\n'); downloadBlob(c,'hyperv_dashboard.txt','text/plain;charset=utf-8'); }
    function exportXlsx(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Hyper-V'); XLSX.writeFile(wb,'hyperv_dashboard.xlsx'); }
    function exportXls(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Hyper-V'); XLSX.writeFile(wb,'hyperv_dashboard.xls.xlsx'); }
    function exportTsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join('\t')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join('\t'));}); downloadBlob(l.join('\r\n'),'hyperv_dashboard.tsv','text/tab-separated-values;charset=utf-8'); }
    function exportSql(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var s=rows.map(function(r){var v=h.map(function(k){return"'"+String(r[k]==null?'':r[k]).replace(/'/g,"''")+"'";});return'INSERT INTO dashboard_export ('+h.join(', ')+') VALUES ('+v.join(', ')+');';}).join('\r\n'); downloadBlob(s,'hyperv_dashboard.sql','text/plain;charset=utf-8'); }
    function exportPng() { html2canvas(document.querySelector('#table')).then(function(c){c.toBlob(function(b){saveAs(b,'hyperv_dashboard.png');}); }); }

    $(function () {
        $table.bootstrapTable({ replaceThisHere });
        computeSummary($table.bootstrapTable('getData'));
        $('.dropdown-item[data-type]').on('click', function(e) {
            e.preventDefault();
            var t=$(this).data('type'), r=getExportRows();
            switch(t) { case 'csv':exportCsv(r);break; case 'txt':exportTxt(r);break; case 'xlsx':exportXlsx(r);break; case 'xls':exportXls(r);break; case 'json':exportJson(r);break; case 'png':exportPng();break; case 'sql':exportSql(r);break; case 'tsv':exportTsv(r);break; }
        });
    });
    </script>
</body>
</html>

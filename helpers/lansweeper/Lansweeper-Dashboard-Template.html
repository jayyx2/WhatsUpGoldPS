<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplaceYourReportNameHere</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.1/dist/bootstrap-table.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-bar { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); color: white; padding: 20px 30px; margin-bottom: 20px; }
        .header-bar h1 { margin: 0; font-weight: 300; font-size: 1.8rem; }
        .header-bar .subtitle { opacity: 0.85; font-size: 0.9rem; }
        .stat-card { border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .stat-card .card-body { padding: 15px 20px; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 600; }
        .stat-card .stat-label { font-size: 0.85rem; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; }
        .table-container { background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); padding: 20px; }
        .fixed-table-toolbar .columns .btn, .fixed-table-toolbar .search .form-control { border-radius: 6px; }
        td, th { font-size: 0.875rem; }
        .badge-critical { background-color: #dc3545; }
        .badge-high { background-color: #fd7e14; }
        .badge-medium { background-color: #ffc107; color: #333; }
        .badge-low { background-color: #28a745; }
        .row-counter { font-size: 0.85rem; color: #6c757d; padding: 6px 0; white-space: nowrap; }
        .fixed-table-toolbar { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .fixed-table-toolbar > .row-counter { flex: 1; order: 1; }
        .fixed-table-toolbar > .search { order: 2; }
        .fixed-table-toolbar > .columns { order: 3; }
    </style>
</head>
<body>
    <div class="header-bar">
        <h1><i class="bi bi-hdd-network"></i> ReplaceYourReportNameHere</h1>
        <div class="subtitle">Generated: ReplaceUpdateTimeHere</div>
    </div>

    <div class="container-fluid px-4">
        <div class="row mb-3" id="statsRow"></div>

        <div class="table-container">
            <table id="dashboardTable"
                   data-toggle="table"
                   data-search="true"
                   data-show-columns="true"
                   data-show-toggle="true"
                   data-show-export="false"
                   data-pagination="false"
                   data-page-size="50"
                   data-page-list="[25, 50, 100, 250, 500, All]"
                   data-sort-name="AssetName"
                   data-sort-order="asc"
                   data-show-fullscreen="true"
                   data-show-search-clear-button="true"
                   class="table table-striped table-hover table-sm">
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.1/dist/extensions/export/bootstrap-table-export.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
        var columns = replaceColumnsHere;
        var data = replaceDataHere;

        // Format columns
        columns.forEach(function(col) {
            if (col.field === 'LansweeperUrl' || col.field === 'Lansweeper Url') {
                col.formatter = function(value) {
                    if (value && value !== 'N/A') {
                        return '<a href="' + value + '" target="_blank" rel="noopener noreferrer"><i class="bi bi-box-arrow-up-right"></i> View</a>';
                    }
                    return value;
                };
            }
            if (col.field === 'Vulnerabilities') {
                col.formatter = function(value) {
                    if (!value || value === 0) return '<span class="badge bg-success">0</span>';
                    if (value >= 10) return '<span class="badge badge-critical">' + value + '</span>';
                    if (value >= 5) return '<span class="badge badge-high">' + value + '</span>';
                    return '<span class="badge badge-medium">' + value + '</span>';
                };
            }
            if (col.field === 'CriticalVulns' || col.field === 'Critical Vulns') {
                col.formatter = function(value) {
                    if (!value || value === 0) return '<span class="badge bg-success">0</span>';
                    return '<span class="badge badge-critical">' + value + '</span>';
                };
            }
        });

        // Compute stats
        var totalAssets = data.length;
        var uniqueTypes = {};
        var uniqueSites = {};
        var withIp = 0;
        data.forEach(function(row) {
            if (row.AssetType && row.AssetType !== 'N/A') uniqueTypes[row.AssetType] = true;
            if (row.Site && row.Site !== 'N/A') uniqueSites[row.Site] = true;
            if (row.IPAddress && row.IPAddress !== 'N/A' && row.IPAddress !== '') withIp++;
        });

        var stats = [
            { label: 'Total Assets', value: totalAssets, icon: 'bi-hdd-stack', color: '#1a73e8' },
            { label: 'Asset Types', value: Object.keys(uniqueTypes).length, icon: 'bi-tags', color: '#0d47a1' },
            { label: 'Sites', value: Object.keys(uniqueSites).length, icon: 'bi-building', color: '#34a853' },
            { label: 'With IP Address', value: withIp, icon: 'bi-ethernet', color: '#ea4335' }
        ];

        var statsHtml = '';
        stats.forEach(function(s) {
            statsHtml += '<div class="col-md-3 col-sm-6 mb-3">' +
                '<div class="card stat-card"><div class="card-body">' +
                '<div class="stat-value" style="color:' + s.color + '"><i class="bi ' + s.icon + '"></i> ' + s.value + '</div>' +
                '<div class="stat-label">' + s.label + '</div>' +
                '</div></div></div>';
        });
        document.getElementById('statsRow').innerHTML = statsHtml;

        // Export helpers
        var $table = $('#dashboardTable');
        var allData = [];

        function getExportRows() { return $table.bootstrapTable('getData', { useCurrentPage:false, includeHiddenRows:true }); }
        function downloadBlob(c,f,m) { saveAs(new Blob([c],{type:m}),f); }
        function escapeCsvValue(v) { var s=String(v==null?'':v); return (s.indexOf('"')!==-1||s.indexOf(',')!==-1||s.indexOf('\n')!==-1)?'"'+s.replace(/"/g,'""')+'"':s; }
        function exportCsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join(',')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join(','));}); downloadBlob(l.join('\r\n'),'lansweeper_dashboard.csv','text/csv;charset=utf-8'); }
        function exportJson(rows) { downloadBlob(JSON.stringify(rows,null,2),'lansweeper_dashboard.json','application/json;charset=utf-8'); }
        function exportTxt(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var c=rows.map(function(r,i){return['--- Row '+(i+1)+' ---'].concat(h.map(function(k){return k+': '+(r[k]==null?'':r[k]);})).join('\r\n');}).join('\r\n\r\n'); downloadBlob(c,'lansweeper_dashboard.txt','text/plain;charset=utf-8'); }
        function exportXlsx(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Lansweeper'); XLSX.writeFile(wb,'lansweeper_dashboard.xlsx'); }
        function exportXls(rows) { if(!rows.length)return; var ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Lansweeper'); XLSX.writeFile(wb,'lansweeper_dashboard.xls.xlsx'); }
        function exportTsv(rows) { if(!rows.length)return; var h=Object.keys(rows[0]),l=[h.join('\t')]; rows.forEach(function(r){l.push(h.map(function(k){return escapeCsvValue(r[k]);}).join('\t'));}); downloadBlob(l.join('\r\n'),'lansweeper_dashboard.tsv','text/tab-separated-values;charset=utf-8'); }
        function exportSql(rows) { if(!rows.length)return; var h=Object.keys(rows[0]); var s=rows.map(function(r){var v=h.map(function(k){return"'"+String(r[k]==null?'':r[k]).replace(/'/g,"''")+"'";});return'INSERT INTO dashboard_export ('+h.join(', ')+') VALUES ('+v.join(', ')+');';}).join('\r\n'); downloadBlob(s,'lansweeper_dashboard.sql','text/plain;charset=utf-8'); }
        function exportPng() { html2canvas(document.querySelector('#dashboardTable')).then(function(c){c.toBlob(function(b){saveAs(b,'lansweeper_dashboard.png');}); }); }

        // Initialize table
        $(function() {
            $table.bootstrapTable({
                columns: columns,
                data: data
            });
            allData = $table.bootstrapTable('getData');

            // Custom export handler
            function wireExport() {
                $(document).on('click', '.dropdown-item[data-type]', function(e) {
                    e.preventDefault(); var t=$(this).data('type'), r=getExportRows();
                    switch(t) { case 'csv':exportCsv(r);break; case 'txt':exportTxt(r);break; case 'xlsx':exportXlsx(r);break; case 'xls':exportXls(r);break; case 'json':exportJson(r);break; case 'png':exportPng();break; case 'sql':exportSql(r);break; case 'tsv':exportTsv(r);break; }
                });
            }

            // Row counter
            function updateRowCounter() {
                var shown = $table.bootstrapTable('getData').length;
                var total = allData.length;
                $('#rowCounter').text(shown === total ? 'Showing ' + total + ' rows' : 'Showing ' + shown + ' of ' + total + ' rows');
            }

            // Inject all controls into bootstrap-table's toolbar
            var $toolbar = $('.fixed-table-toolbar');
            if ($toolbar.length) {
                // Row counter on the left
                $toolbar.prepend('<span class="row-counter" id="rowCounter"></span>');

                // Pagination toggle + custom export into the button group
                var $btnGroup = $toolbar.find('.columns');
                if ($btnGroup.length) {
                    // Pagination toggle
                    var $pgBtn = $('<button type="button" class="btn btn-secondary" title="Toggle pagination">' +
                        '<i class="bi bi-list-ol"></i></button>');
                    $btnGroup.prepend($pgBtn);
                    $pgBtn.on('click', function() {
                        var isOn = $table.bootstrapTable('getOptions').pagination;
                        $table.bootstrapTable('togglePagination');
                        $(this).toggleClass('active', !isOn);
                        updateRowCounter();
                    });

                    // Custom export dropdown
                    var $exportBtn = $(
                        '<div class="btn-group">' +
                        '<button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">' +
                        '<i class="bi bi-download"></i> Export</button>' +
                        '<ul class="dropdown-menu dropdown-menu-end">' +
                        '<li><a class="dropdown-item" href="#" data-type="csv">CSV</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="txt">TXT</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="xlsx">XLSX</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="xls">XLS</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="json">JSON</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="png">PNG</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="sql">SQL</a></li>' +
                        '<li><a class="dropdown-item" href="#" data-type="tsv">TSV</a></li>' +
                        '</ul></div>');
                    $btnGroup.append($exportBtn);
                }
            }

            $table.on('post-body.bs.table', updateRowCounter);
            wireExport();
            updateRowCounter();
        });
    </script>
</body>
</html>
